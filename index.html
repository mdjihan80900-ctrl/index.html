<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTR COIN AIRDROP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #181a20; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #2b2f36; }
        .gradient-btn { background: linear-gradient(90deg, #3a86ff, #8338ec); border: none; }
        .wallet-card { background: #1e2126; border-radius: 10px; padding: 12px; border-left: 4px solid #3a86ff; margin-bottom: 8px; }
        .task-done { opacity: 0.5; pointer-events: none; border-color: gray !important; color: gray !important; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="text-center my-6">
        <img src="https://i.postimg.cc/kR9Z33Zf/image-4.png" alt="Logo" class="w-24 mx-auto rounded-full border-4 border-blue-500 shadow-xl">
        <h1 class="text-xl font-black mt-2 text-blue-400 italic uppercase">ASTR COIN AIRDROP</h1>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-xs uppercase mb-2">Airdrop Ending In:</p>
        <div id="timerDisplay" class="text-xl font-mono font-bold text-white tracking-widest border border-blue-500 p-2 rounded-lg bg-blue-500/10">
            Loading...
        </div>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-sm">Your ASTR Balance</p>
        <h2 id="balanceDisplay" class="text-4xl font-black mt-1">0.00 ASTR</h2>
        <button id="claimBtn" onclick="claimWelcome()" class="gradient-btn w-full py-3 mt-4 rounded-xl font-black text-lg shadow-lg">CLAIM 8,000 ASTR</button>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm text-yellow-500 mb-3 uppercase italic">Wallet Options</h3>
        <div class="wallet-card flex justify-between items-center">
            <span class="text-sm font-bold">Binance Wallet</span>
            <button onclick="connectW('Binance')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Connect</button>
        </div>
        <div class="wallet-card flex justify-between items-center" style="border-left-color: #00f0ff;">
            <span class="text-sm font-bold">Bitget Wallet</span>
            <button onclick="connectW('Bitget')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Connect</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-4 uppercase text-blue-400">Tasks (20 ASTR Each)</h3>
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
            <span class="text-xs">Follow on Twitter/X</span>
            <button id="task1" onclick="completeTask(1)" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold">FOLLOW</button>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-xs">Join Telegram Channel</span>
            <button id="task2" onclick="completeTask(2)" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold">JOIN</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-2 text-blue-400">Your Referral Link</h3>
        <div class="flex gap-2 bg-black p-2 rounded-lg border border-gray-700">
            <input id="refInput" type="text" readonly value="https://t.me/ASTR_Airdrop_Bot?start=user123" class="w-full bg-transparent text-[10px] text-blue-300 outline-none">
            <button onclick="copyRef()" class="text-blue-500 font-bold text-xs uppercase px-2">COPY</button>
        </div>
    </div>

    <button onclick="alert('Withdrawal Locked Until Airdrop Ends')" class="w-full py-4 rounded-2xl bg-green-600 font-black text-xl uppercase shadow-2xl">Withdraw</button>

    <script>
        let balance = parseFloat(localStorage.getItem('astr_bal')) || 0;
        let claimed = localStorage.getItem('astr_clm') === 'true';

        window.onload = () => {
            updateUI();
            startTimer();
            // চেক করা হচ্ছে টাস্ক আগে করা হয়েছে কি না
            if(localStorage.getItem('task1_done')) { lockTask('task1'); }
            if(localStorage.getItem('task2_done')) { lockTask('task2'); }
        };

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " ASTR";
            if (claimed) {
                let cBtn = document.getElementById('claimBtn');
                cBtn.innerText = "ALREADY CLAIMED";
                cBtn.disabled = true;
                cBtn.style.opacity = "0.5";
            }
        }

        function claimWelcome() {
            if(!claimed) {
                balance += 8000;
                claimed = true;
                localStorage.setItem('astr_bal', balance);
                localStorage.setItem('astr_clm', 'true');
                updateUI();
            }
        }

        function completeTask(id) {
            balance += 20;
            localStorage.setItem('astr_bal', balance);
            localStorage.setItem('task' + id + '_done', 'true');
            lockTask('task' + id);
            updateUI();
            alert("20 ASTR Added!");
        }

        function lockTask(elementId) {
            let btn = document.getElementById(elementId);
            btn.innerText = "COMPLETED";
            btn.classList.add('task-done');
        }

        function copyRef() {
            const input = document.getElementById("refInput");
            input.select();
            document.execCommand("copy");
            alert("Referral Link Copied!");
        }

        function connectW(name) { alert(name + " Wallet Connection Pending..."); }

        // টাইমার ফাংশন (১৬ দিন)
        function startTimer() {
            let countDate = new Date().getTime() + (16 * 24 * 60 * 60 * 1000);
            setInterval(() => {
                let now = new Date().getTime();
                let gap = countDate - now;
                let d = Math.floor(gap / (1000 * 60 * 60 * 24));
                let h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
                let s = Math.floor((gap % (1000 * 60)) / 1000);
                document.getElementById('timerDisplay').innerText = `${d}d : ${h}h : ${m}m : ${s}s`;
            }, 1000);
        }
    </script>
</body>
</html>
