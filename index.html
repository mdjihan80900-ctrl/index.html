<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTR COIN AIRDROP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #181a20; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #2b2f36; }
        .gradient-btn { background: linear-gradient(90deg, #3a86ff, #8338ec); border: none; }
        .wallet-card { background: #1e2126; border-radius: 10px; padding: 12px; border-left: 4px solid #3a86ff; margin-bottom: 8px; }
        .task-done { opacity: 0.5; pointer-events: none; border: 1px solid gray !important; color: gray !important; }
        .fixed-input { background: rgba(0,0,0,0.5); border: 1px solid #3a86ff; border-radius: 6px; padding: 6px 10px; width: 100%; color: #3a86ff; font-size: 11px; outline: none; margin-top: 8px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="text-center my-6">
        <img src="https://i.postimg.cc/kR9Z33Zf/image-4.png" alt="ASTR Logo" class="w-24 mx-auto rounded-full border-4 border-blue-500 shadow-xl">
        <h1 class="text-xl font-black mt-2 text-blue-400 italic uppercase">ASTR COIN AIRDROP</h1>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-xs uppercase mb-2">Airdrop Ending In:</p>
        <div style="border: 1px solid #3b82f6; border-radius: 8px; padding: 5px 15px; margin: 15px auto; width: fit-content; background: rgba(59, 130, 246, 0.1);">
    <div id="timerDisplay" style="font-size: 24px; font-weight: bold; color: white; font-family: 'Courier New', Courier, monospace; letter-spacing: 1px;">
        15d : 23h : 50m : 52s
    </div>
        </div>
        </div>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-sm">Your ASTR Balance</p>
        <h2 id="balanceDisplay" class="text-4xl font-black mt-1">8,460 ASTR</h2>
        <button class="gradient-btn w-full py-3 mt-4 rounded-xl font-black text-lg shadow-lg opacity-50" disabled>ALREADY CLAIMED</button>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm text-yellow-500 mb-3 uppercase italic">Wallet Options</h3>
        <div class="wallet-card">
    <div class="wallet-card">
    <div class="flex justify-between items-center mb-2">
        <div class="flex items-center gap-2">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" width="20" height="20">
            <span class="text-sm font-bold">Binance Wallet (ASTR)</span>
        </div>
        <button onclick="saveW('Binance')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Save</button>
    </div>
    <input type="text" id="binanceAddr" placeholder="Paste your Binance ASTR Address here..." class="w-full bg-black/20 border border-gray-700 rounded p-2 text-xs outline-none">
    </div>
    <input type="text" id="binanceAddr" placeholder="Paste your Binance ASTR Address here..." class="w-full bg-black/20 border border-gray-700 rounded p-2 text-xs outline-none">
        <div class="wallet-card" style="border-left-color: #00f0ff;">
    <div class="flex justify-between items-center mb-2">
        <div class="flex items-center gap-2">
            <img src="https://img.bitgetimg.com/multi-lang/web/20230522/1684725454641_32_32.png" width="20" height="20" style="border-radius: 4px;">
            <span class="text-sm font-bold">Bitget Wallet (ASTR)</span>
        </div>
        <button onclick="saveW('Bitget')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Save</button>
    </div>
    <input type="text" id="bitgetAddr" placeholder="Paste your Bitget ASTR Address here..." class="w-full bg-black/20 border border-gray-700 rounded p-2 text-xs outline-none">
        </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-4 uppercase text-blue-400">Tasks (20 ASTR Each)</h3>
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
            <span class="text-xs">Join Telegram Official</span>
            <button id="task1Btn" onclick="doTask(1, 'https://t.me/XNO_AIRDROP_OFFICIAL')" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold">JOIN</button>
        </div>
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-800">
            <span class="text-xs">Join Telegram Channel</span>
            <button id="task2Btn" onclick="doTask(2, 'https://t.me/+pO1956ctV4JiODg9')" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold">JOIN</button>
        </div>
        <div class="flex justify-between items-center">
            <span class="text-xs">Follow on Twitter/X</span>
            <button id="task3Btn" onclick="doTask(3, 'https://x.com/i/status/2035895387677233355')" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold">FOLLOW</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-2 text-blue-400">Your Referral Link</h3>
        <div class="flex gap-2 bg-black p-2 rounded-lg border border-gray-700">
            <input id="refUrl" type="text" readonly value="https://t.me/ASTR_Airdrop_Bot?start=user123" class="w-full bg-transparent text-[10px] text-blue-300 outline-none">
            <button onclick="copyRef()" class="text-blue-500 font-bold text-xs uppercase px-2">COPY</button>
        </div>
    </div>

    <button onclick="handleWithdraw()" class="w-full py-4 rounded-2xl bg-green-600 font-black text-xl uppercase shadow-2xl">Withdraw</button>

    <script>
    let balance = parseFloat(localStorage.getItem('astr_balance')) || 8460;

    window.onload = () => {
        updateUI();
        startTimer();
        if(localStorage.getItem('t1_done')) lockTask(1);
        if(localStorage.getItem('t2_done')) lockTask(2);
        if(localStorage.getItem('t3_done')) lockTask(3);

        // সেভ করা অ্যাড্রেসগুলো ইনপুট বক্সে দেখাচ্ছে
        document.getElementById('binanceAddr').value = localStorage.getItem('binance_addr') || "";
        document.getElementById('bitgetAddr').value = localStorage.getItem('bitget_addr') || "";
    };

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " ASTR";
    }

    function saveW(name) {
        let id = name === 'Binance' ? 'binanceAddr' : 'bitgetAddr';
        let addr = document.getElementById(id).value;
        
        if (addr.length > 15) { // অ্যাড্রেস ঠিক আছে কি না চেক করছে
            // ব্রাউজারে পার্মানেন্ট সেভ করছে
            localStorage.setItem(name.toLowerCase() + '_addr', addr);
            alert(name + " Address Saved Permanently!");
        } else {
            alert("Please enter a valid ASTR address!");
        }
    }

        function doTask(id, url) {
            window.open(url, '_blank');
            setTimeout(() => {
                if(!localStorage.getItem('t' + id + '_done')) {
                    balance += 20;
                    localStorage.setItem('astr_bal', balance);
                    localStorage.setItem('t' + id + '_done', 'true');
                    lockTask(id);
                    updateUI();
                    alert("Task Completed! 20 ASTR Added.");
                }
            }, 2000); 
        }

        function lockTask(id) {
            let btn = document.getElementById('task' + id + 'Btn');
            btn.innerText = "COMPLETED";
            btn.classList.add('task-done');
        }

        function copyRef() {
            const el = document.getElementById("refUrl");
            el.select();
            document.execCommand("copy");
            alert("Referral Link Copied!");
        }

        // আপনার চাওয়া নতুন ইংরেজি মেসেজ
        function handleWithdraw() {
            alert("Dear User,\n\nYou can only withdraw your valuable tokens after the airdrop ends, not before that. Thank you.");
        }

        function startTimer() {
    const display = document.getElementById('timerDisplay');
    if (!display) return;

    let endTime = localStorage.getItem('airdropEndTime');

    if (!endTime) {
        // ১৫ দিন সময় সেট করা হলো
        endTime = Date.now() + (15 * 24 * 60 * 60 * 1000); 
        localStorage.setItem('airdropEndTime', endTime);
    }

    const countdown = setInterval(() => {
        let now = Date.now();
        let timeLeft = Math.floor((endTime - now) / 1000);

        if (timeLeft <= 0) {
            clearInterval(countdown);
            display.innerText = "00:00:00";
            return;
        }

        let d = Math.floor(timeLeft / (24 * 3600));
        let h = Math.floor((timeLeft % (24 * 3600)) / 3600);
        let m = Math.floor((timeLeft % 3600) / 60);
        let s = timeLeft % 60;

        display.innerText = d + "d : " + 
            (h < 10 ? "0" + h : h) + "h : " + 
            (m < 10 ? "0" + m : m) + "m : " + 
            (s < 10 ? "0" + s : s) + "s";
    }, 1000);
            }
    </script>
</body>
</html>
