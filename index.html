<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTR COIN AIRDROP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #181a20; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #2b2f36; }
        .gradient-btn { background: linear-gradient(90deg, #3a86ff, #8338ec); border: none; }
        .wallet-card { background: #1e2126; border-radius: 10px; padding: 12px; border-left: 4px solid #3a86ff; margin-bottom: 8px; }
        .task-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2b2f36; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="text-center my-6">
        <img src="https://i.postimg.cc/kR9Z33Zf/image-4.png" alt="ASTR Logo" class="w-24 mx-auto rounded-full border-4 border-blue-500 shadow-xl">
        <h1 class="text-xl font-black mt-2 text-blue-400 italic uppercase">ASTR COIN AIRDROP</h1>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-xs uppercase mb-2">Airdrop Ending In:</p>
        <div id="timer" class="text-xl font-mono font-bold text-white tracking-widest border border-blue-500 p-2 rounded-lg bg-blue-500/10">
            15d : 23h : 59m : 24s
        </div>
    </div>

    <div class="card text-center">
        <p class="text-gray-400 text-sm">Your ASTR Balance</p>
        <h2 id="balanceDisplay" class="text-4xl font-black mt-1">8,040 ASTR</h2>
        <button id="claimBtn" onclick="claimWelcome()" class="gradient-btn w-full py-3 mt-4 rounded-xl font-black text-lg shadow-lg">ALREADY CLAIMED</button>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm text-yellow-500 mb-3 uppercase italic">Wallet Options</h3>
        
        <div class="wallet-card flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="w-6">
                <span class="text-sm font-bold">Binance Wallet</span>
            </div>
            <button onclick="connectWallet('Binance')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Connect</button>
        </div>

        <div class="wallet-card flex justify-between items-center" style="border-left-color: #01f0ff;">
            <div class="flex items-center gap-3">
                <img src="https://cryptologos.cc/logos/solana-sol-logo.png" class="w-6 rounded-full">
                <span class="text-sm font-bold">Bitget Wallet</span>
            </div>
            <button onclick="connectWallet('Bitget')" class="bg-blue-600 px-4 py-1 rounded-lg text-xs font-bold">Connect</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-4 uppercase text-blue-400">Tasks (20 ASTR Each)</h3>
        
        <div class="task-row">
            <span class="text-xs">Follow on Twitter/X</span>
            <button onclick="doTask(1)" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold uppercase">Follow</button>
        </div>
        
        <div class="task-row border-none">
            <span class="text-xs">Join Telegram Channel</span>
            <button onclick="doTask(2)" class="text-blue-400 border border-blue-400 px-4 py-1 rounded-md text-xs font-bold uppercase">Join</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold text-sm mb-2 text-blue-400">Your Referral Link</h3>
        <div class="flex gap-2 bg-black p-2 rounded-lg border border-gray-700">
            <input id="refInput" type="text" readonly value="https://t.me/ASTR_Airdrop_Bot?start=user123" class="w-full bg-transparent text-[10px] text-blue-300 outline-none">
            <button onclick="copyRef()" class="text-blue-500 font-bold text-xs uppercase px-2">COPY</button>
        </div>
        <p class="text-[10px] text-gray-500 mt-2 italic text-center">Invite friends and get 18 ASTR per referral</p>
    </div>

    <button onclick="handleWithdraw()" class="w-full py-4 rounded-2xl bg-green-600 font-black text-xl shadow-2xl mb-10 tracking-widest uppercase">Withdraw</button>

    <script>
        let balance = parseFloat(localStorage.getItem('astr_bal')) || 8040;

        window.onload = () => { refreshUI(); };

        function refreshUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " ASTR";
        }

        // কপি ফাংশন
        function copyRef() {
            const copyText = document.getElementById("refInput");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Referral link copied!");
        }

        function doTask(id) {
            balance += 20;
            localStorage.setItem('astr_bal', balance);
            refreshUI();
            alert("Task completed! 20 ASTR added.");
        }

        function connectWallet(name) {
            let addr = prompt("Enter your " + name + " SOL Address:");
            if(addr) alert(name + " Wallet Connected!");
        }

        function handleWithdraw() {
            alert("Withdrawal is locked until the countdown ends.");
        }
    </script>
</body>
</html>
